name: Review

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  coding-standards-go-fmt:
    name: Go coding standards (fmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Coding standards
        run: |
          go fmt ./...
          # check that no changes have been made
          git diff --exit-code

  coding-standards-go-vet:
    name: Go coding standards (vet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: go vet
        run: |
          go vet ./...

  go-mod-tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: go mod tidy
        run: |
          go mod tidy
          # check that no changes have been made
          git diff --exit-code

  # @see https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Build
        run: go build -v ./...

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Test
        run: go test -v ./...
